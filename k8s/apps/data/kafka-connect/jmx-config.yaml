apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-connect-jmx
  namespace: data
data:
  jmx-exporter.yaml: |
    lowercaseOutputName: true
    lowercaseOutputLabelNames: true
    rules:
      - pattern: "kafka.connect<type=connect-worker-metrics><>([^:]+)"
        name: "kafka_connect_worker_$1"
      - pattern: "kafka.connect<type=connect-worker-rebalance-metrics><>([^:]+)"
        name: "kafka_connect_rebalance_$1"
      - pattern: "kafka.connect<type=connector-metrics, connector=([^,]+)><>([^:]+)"
        name: "kafka_connect_connector_$2"
        labels:
          connector: "$1"
      - pattern: "kafka.connect<type=connector-task-metrics, connector=([^,]+), task=([^,]+)><>([^:]+)"
        name: "kafka_connect_task_$3"
        labels:
          connector: "$1"
          task: "$2"
      - pattern: "debezium.([^<]+)<type=connector-metrics, context=([^,]+), server=([^>]+)><>([^:]+)"
        name: "debezium_$1_$4"
        labels:
          context: "$2"
          server: "$3"
      - pattern: "debezium.([^<]+)<type=connector-metrics, context=([^,]+), server=([^,]+), task=([^>]+)><>([^:]+)"
        name: "debezium_$1_$5"
        labels:
          context: "$2"
          server: "$3"
          task: "$4"
