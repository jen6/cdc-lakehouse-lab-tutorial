apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rds-source
  namespace: data
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: rds-source
    creationPolicy: Owner
  data:
    - secretKey: host
      remoteRef:
        key: REPLACE_WITH_RDS_SECRET_NAME
        property: host
    - secretKey: port
      remoteRef:
        key: REPLACE_WITH_RDS_SECRET_NAME
        property: port
    - secretKey: username
      remoteRef:
        key: REPLACE_WITH_RDS_SECRET_NAME
        property: username
    - secretKey: password
      remoteRef:
        key: REPLACE_WITH_RDS_SECRET_NAME
        property: password
