apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: orders-cdc-flink
  namespace: data
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - orders-cdc
  namespaceSelector:
    matchNames:
      - data
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 30s
