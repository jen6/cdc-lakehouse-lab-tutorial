apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: source-generator
  namespace: data
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: source-generator
  namespaceSelector:
    matchNames:
      - data
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
