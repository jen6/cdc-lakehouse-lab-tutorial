apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: source-generator-rds
  namespace: data
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: source-generator-aws-secrets-manager
    kind: SecretStore
  target:
    name: source-generator-rds
    creationPolicy: Owner
  data:
    - secretKey: host
      remoteRef:
        key: REPLACE_WITH_RDS_SECRET_NAME
        property: host
    - secretKey: port
      remoteRef:
        key: REPLACE_WITH_RDS_SECRET_NAME
        property: port
    - secretKey: username
      remoteRef:
        key: REPLACE_WITH_RDS_SECRET_NAME
        property: username
    - secretKey: password
      remoteRef:
        key: REPLACE_WITH_RDS_SECRET_NAME
        property: password
