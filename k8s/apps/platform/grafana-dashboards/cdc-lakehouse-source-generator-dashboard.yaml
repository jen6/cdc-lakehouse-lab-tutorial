                "value": "data"
              }
            ],
            "current": {
              "selected": true,
              "text": "data",
              "value": "data"
            }
          }
        ]
      },
      "time": {
        "from": "now-3h",
        "to": "now"
      },
      "timezone": "",
      "title": "CDC Lakehouse / Source Generator Best Practice",
      "uid": "cdc-lakehouse-source-generator",
      "version": 1,
      "weekStart": ""
    }
