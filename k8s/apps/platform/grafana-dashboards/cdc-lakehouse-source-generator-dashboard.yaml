---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-cdc-lakehouse-source-generator
  namespace: platform
  labels:
    grafana_dashboard: '1'
data:
  cdc-lakehouse-source-generator.json: |-
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [

      ],
      "liveNow": false,
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Generator Up",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "mappings": [

              ],
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": [

            ]
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center"
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "max(up{namespace=\"$namespace\",job=\"source-generator\"})",
              "range": true,
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Target Rate",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "x": 6,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "mappings": [

              ],
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": [

            ]
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center"
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "max(source_generator_target_rate_per_second{namespace=\"$namespace\"})",
              "range": true,
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Mutations / sec",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "x": 12,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "mappings": [

              ],
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": [

            ]
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center"
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(rate(source_generator_events_total{namespace=\"$namespace\"}[5m]))",
              "range": true,
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Errors / 1h",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "x": 18,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "mappings": [

              ],
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": [

            ]
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center"
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(increase(source_generator_errors_total{namespace=\"$namespace\"}[1h])) or vector(0)",
              "range": true,
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Mutation Rate by Action",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "x": 0,
            "y": 4,
            "w": 12,
            "h": 8
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "mappings": [

              ]
            },
            "overrides": [

            ]
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "lastNotNull",
                "max"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(rate(source_generator_events_total{namespace=\"$namespace\"}[5m])) by (action)",
              "range": true,
              "refId": "A",
              "legendFormat": "{{action}}"
            }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Action Latency p95 Approximation",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "x": 12,
            "y": 4,
            "w": 12,
            "h": 8
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "mappings": [

              ]
            },
            "overrides": [

            ]
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "lastNotNull",
                "max"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "histogram_quantile(0.95, sum(rate(source_generator_action_duration_seconds_bucket{namespace=\"$namespace\"}[5m])) by (le, action))",
              "range": true,
              "refId": "A",
              "legendFormat": "p95 {{action}}"
            }
          ]
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Action Latency Average",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "x": 0,
            "y": 12,
            "w": 12,
            "h": 8
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "mappings": [

              ]
            },
            "overrides": [

            ]
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "lastNotNull",
                "max"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(rate(source_generator_action_duration_seconds_sum{namespace=\"$namespace\"}[5m])) by (action) / sum(rate(source_generator_action_duration_seconds_count{namespace=\"$namespace\"}[5m])) by (action)",
              "range": true,
              "refId": "A",
              "legendFormat": "avg {{action}}"
            }
          ]
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Python Runtime Health",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "x": 12,
            "y": 12,
            "w": 12,
            "h": 8
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "mappings": [

              ]
            },
            "overrides": [

            ]
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "lastNotNull",
                "max"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "rate(python_gc_collections_total{namespace=\"$namespace\",job=\"source-generator\"}[5m])",
              "range": true,
              "refId": "A",
              "legendFormat": "gc {{generation}}"
            },
            {
              "editorMode": "code",
              "expr": "process_resident_memory_bytes{namespace=\"$namespace\",job=\"source-generator\"}",
              "range": true,
              "refId": "B",
              "legendFormat": "rss {{pod}}"
            },
            {
              "editorMode": "code",
              "expr": "rate(process_cpu_seconds_total{namespace=\"$namespace\",job=\"source-generator\"}[5m])",
              "range": true,
              "refId": "C",
              "legendFormat": "cpu {{pod}}"
            }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": [
        "cdc",
        "lakehouse",
        "source-generator"
      ],
      "templating": {
        "list": [
          {
            "name": "DS_PROMETHEUS",
