apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-dashboards
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "25"
spec:
  project: platform
  source:
    repoURL: https://github.com/your-org/cdc-lakehouse-lab.git
    targetRevision: main
    path: k8s/apps/platform/grafana-dashboards
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
