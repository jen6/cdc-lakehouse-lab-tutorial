apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flink-kubernetes-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: data
  source:
    repoURL: https://downloads.apache.org/flink/flink-kubernetes-operator-1.12.1/
    chart: flink-kubernetes-operator
    targetRevision: 1.12.1
    helm:
      releaseName: flink-kubernetes-operator
      values: |
        watchNamespaces:
          - data
        operatorServiceAccount:
          create: true
          name: flink-kubernetes-operator
        jobServiceAccount:
          create: false
          name: flink-orders-cdc
  destination:
    server: https://kubernetes.default.svc
    namespace: data
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jqPathExpressions:
        - .spec.versions[].additionalPrinterColumns[].priority
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
