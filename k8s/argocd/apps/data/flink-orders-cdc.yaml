apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flink-orders-cdc
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  project: data
  source:
    repoURL: https://github.com/your-org/cdc-lakehouse-lab.git
    targetRevision: main
    path: k8s/apps/data/flink-orders-cdc
  destination:
    server: https://kubernetes.default.svc
    namespace: data
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
