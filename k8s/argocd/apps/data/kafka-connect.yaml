apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka-connect
  namespace: argocd
spec:
  project: data
  source:
    repoURL: https://github.com/your-org/cdc-lakehouse-lab.git
    targetRevision: main
    path: k8s/apps/data/kafka-connect
  destination:
    server: https://kubernetes.default.svc
    namespace: data
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
